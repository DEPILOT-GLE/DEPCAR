<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shop Parts – DEP-CAR SPARE PARTS</title>
<link rel="stylesheet" href="css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
.shop-layout{display:grid;grid-template-columns:280px 1fr;gap:32px;padding:100px 60px 80px;min-height:100vh;}
.sidebar{position:sticky;top:90px;height:fit-content;}
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.sidebar-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase;}
.car-filter-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:none;transition:all .3s;margin-bottom:4px;}
.car-filter-item:hover{background:rgba(255,184,0,.08);}
.car-filter-item.active{background:rgba(255,184,0,.12);border:1px solid rgba(255,184,0,.3);}
.car-filter-item span:first-child{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.car-filter-item .cf-name{flex:1;font-size:14px;font-weight:500;}
.car-filter-item .cf-count{font-size:12px;color:var(--muted);background:var(--dark3);padding:2px 8px;border-radius:50px;}
.cat-btn{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;cursor:none;transition:all .3s;margin-bottom:2px;}
.cat-btn:hover{color:var(--text);background:rgba(255,255,255,.05);}
.cat-btn.active{color:var(--gold);background:rgba(255,184,0,.1);font-weight:600;}
.shop-header{margin-bottom:28px;}
.shop-header h1{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;margin-bottom:4px;}
.shop-header p{color:var(--muted);font-size:14px;}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.results-count{font-size:14px;color:var(--muted);}
.sort-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;outline:none;}
.no-results{text-align:center;padding:80px 20px;color:var(--muted);}
.no-results .icon{font-size:60px;margin-bottom:16px;}
.no-results h3{font-size:22px;margin-bottom:8px;color:var(--text);}
.active-car-banner{background:linear-gradient(135deg,rgba(255,184,0,.12),rgba(10,132,255,.08));border:1px solid rgba(255,184,0,.25);border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.active-car-banner .car-info{display:flex;align-items:center;gap:12px;}
.active-car-banner img{width:80px;height:50px;object-fit:cover;border-radius:8px;}
.active-car-banner h4{font-size:16px;font-weight:700;}
.active-car-banner p{font-size:13px;color:var(--muted);}
@media(max-width:1024px){.shop-layout{grid-template-columns:1fr;padding:100px 30px 60px;}.sidebar{position:static;display:grid;grid-template-columns:1fr 1fr;gap:16px;}}
@media(max-width:600px){.shop-layout{padding:100px 16px 60px;}.sidebar{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="pageTransition" class="page-transition"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo" onclick="event.preventDefault();navigate('index.html')">
    <div style="width:44px;height:44px;background:linear-gradient(135deg,#FFB800,#FF8C00);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:18px;font-family:'Rajdhani',sans-serif;">D</div>
    <div class="nav-logo-text"><span>DEP-CAR SPARE PARTS</span><span>Premium Auto Spares</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html" onclick="event.preventDefault();navigate('index.html')">Home</a>
    <a href="shop.html" class="active">Shop Parts</a>
    <a href="orders.html" onclick="event.preventDefault();navigate('orders.html')">My Orders</a>
  </div>
  <div class="nav-actions">
    <a href="cart.html" class="cart-btn" onclick="event.preventDefault();navigate('cart.html')">🛒 Cart <span class="cart-count">0</span></a>
    <div id="authBtns" style="display:flex;gap:8px;">
      <a href="auth.html" class="btn btn-outline" onclick="event.preventDefault();navigate('auth.html')">Login</a>
      <a href="auth.html" class="btn btn-gold" onclick="event.preventDefault();navigate('auth.html')">Register</a>
    </div>
    <div id="userMenu" style="display:none;align-items:center;gap:12px;">
      <span id="userGreet" style="font-size:14px;color:var(--muted);"></span>
      <button class="btn btn-outline" onclick="logout()" style="font-size:13px;padding:8px 16px;">Logout</button>
    </div>
  </div>
</nav>

<div class="shop-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- SEARCH -->
    <div class="sidebar-card">
      <div class="sidebar-title">🔍 Search</div>
      <input id="searchInput" class="form-input" type="text" placeholder="Search parts, models..." oninput="renderProducts()"/>
    </div>
    <!-- CAR FILTER -->
    <div class="sidebar-card">
      <div class="sidebar-title">🚗 Select Car</div>
      <div id="carFilters"></div>
    </div>
    <!-- CATEGORY -->
    <div class="sidebar-card">
      <div class="sidebar-title">🔩 Category</div>
      <div id="catFilters"></div>
    </div>
    <!-- PRICE -->
    <div class="sidebar-card">
      <div class="sidebar-title">💰 Price Range</div>
      <div style="margin-bottom:8px;font-size:13px;color:var(--muted);">Max: <span id="priceDisplay" style="color:var(--gold);font-weight:600;">KSh 1,000,000</span></div>
      <input type="range" id="priceRange" min="5000" max="1000000" step="5000" value="1000000" style="width:100%;accent-color:var(--gold);" oninput="document.getElementById('priceDisplay').textContent='KSh '+parseInt(this.value).toLocaleString();renderProducts()"/>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="shop-header">
      <h1 id="shopTitle">All Parts</h1>
      <p id="shopSubtitle">Browse our full range of genuine OEM and performance parts</p>
    </div>
    <div id="activeBanner"></div>
    <!-- TOP BAR -->
    <div class="results-bar">
      <span class="results-count" id="resultsCount">Loading...</span>
      <select class="sort-select" id="sortSelect" onchange="renderProducts()">
        <option value="default">Default Sort</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
      </select>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
let selectedCar = 'all', selectedCat = 'All';

// Read URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('car')) selectedCar = urlParams.get('car');
if (urlParams.get('cat')) selectedCat = urlParams.get('cat');

// Build car filters
function buildCarFilters() {
  const el = document.getElementById('carFilters');
  el.innerHTML = `<div class="car-filter-item ${selectedCar==='all'?'active':''}" onclick="selectCar('all')">
    <span style="background:#FFB800;"></span><span class="cf-name">All Vehicles</span>
    <span class="cf-count">${PARTS.length}</span></div>`;
  CARS.forEach(c => {
    const cnt = PARTS.filter(p=>p.car===c.id).length;
    el.innerHTML += `<div class="car-filter-item ${selectedCar===c.id?'active':''}" onclick="selectCar('${c.id}')">
      <span style="background:${c.color};"></span>
      <span class="cf-name">${c.name}</span>
      <span class="cf-count">${cnt}</span></div>`;
  });
}

// Build category filters
function buildCatFilters() {
  const el = document.getElementById('catFilters');
  el.innerHTML = CATEGORIES.map(c=>`<button class="cat-btn ${selectedCat===c?'active':''}" onclick="selectCat('${c}')">${c}</button>`).join('');
}

function selectCar(id) {
  selectedCar = id; buildCarFilters(); renderProducts();
  const car = CARS.find(c=>c.id===id);
  if (car) {
    document.getElementById('shopTitle').textContent = car.name + ' Parts';
    document.getElementById('shopSubtitle').textContent = 'Genuine OEM parts for ' + car.model;
    document.getElementById('activeBanner').innerHTML = `<div class="active-car-banner">
      <div class="car-info"><img src="${car.img}" alt="${car.name}" onerror="this.src='https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=200&q=80'"/>
      <div><h4>${car.name}</h4><p>${car.model}</p></div></div>
      <button class="btn btn-dark" style="font-size:13px;padding:8px 16px;" onclick="selectCar('all')">✕ Clear</button></div>`;
  } else {
    document.getElementById('shopTitle').textContent = 'All Parts';
    document.getElementById('shopSubtitle').textContent = 'Browse our full range of genuine OEM and performance parts';
    document.getElementById('activeBanner').innerHTML = '';
  }
}

function selectCat(cat) { selectedCat = cat; buildCatFilters(); renderProducts(); }

function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const maxPrice = parseInt(document.getElementById('priceRange').value);
  const sort = document.getElementById('sortSelect').value;
  let parts = PARTS.filter(p => {
    const matchCar = selectedCar === 'all' || p.car === selectedCar;
    const matchCat = selectedCat === 'All' || p.category === selectedCat;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.carName.toLowerCase().includes(search) || p.category.toLowerCase().includes(search);
    const matchPrice = p.price <= maxPrice;
    return matchCar && matchCat && matchSearch && matchPrice;
  });
  if (sort === 'price-asc') parts.sort((a,b)=>a.price-b.price);
  else if (sort === 'price-desc') parts.sort((a,b)=>b.price-a.price);
  else if (sort === 'name-asc') parts.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('resultsCount').textContent = `${parts.length} part${parts.length!==1?'s':''} found`;
  if (!parts.length) {
    document.getElementById('productsGrid').innerHTML = `<div class="no-results" style="grid-column:1/-1;">
      <div class="icon">🔍</div><h3>No Parts Found</h3>
      <p>Try a different search, car or category</p></div>`;
    return;
  }
  document.getElementById('productsGrid').innerHTML = parts.map(p=>`
    <div class="product-card" style="animation:fadeInUp .4s ease both;">
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=400&q=80'"/>
        ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
        <span style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:50px;">${p.category}</span>
      </div>
      <div class="product-body">
        <div class="product-car">${p.carName}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <div class="product-price">${formatKES(p.price)}<span>/unit</span></div>
          <button class="add-cart-btn" onclick="handleAddToCart(${p.id})">🛒 Add to Cart</button>
        </div>
      </div>
    </div>`).join('');
}

function handleAddToCart(id) {
  const cu = getCurrentUser();
  if (!cu) { showToast('Please login to add items to cart', 'error'); setTimeout(()=>navigate('auth.html'),1200); return; }
  addToCart(id);
}

// Init
buildCarFilters();
buildCatFilters();
if (selectedCar !== 'all') selectCar(selectedCar);
else renderProducts();
</script>
</body>
</html>
